# China Deployment: Alibaba Cloud Direct Mail (阿里云邮件推送)
# Activate with: spring.profiles.active=china or prod,china
# Set MAIL_USERNAME, MAIL_PASSWORD, MAIL_FROM from Alibaba Direct Mail console

# SMTP: Alibaba Direct Mail
spring.mail.host=${MAIL_HOST:smtpdm.aliyun.com}
spring.mail.port=${MAIL_PORT:80}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_USE_STARTTLS:false}
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_USE_SSL:false}
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtpdm.aliyun.com}
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
# Alibaba recommendation: avoid display issues with long attachment names
spring.mail.properties.mail.mime.splitlongparameters=false

# Email module: MAIL_FROM must match verified sender address in Alibaba console.
# Override with your verified Direct Mail sender address, e.g. noreply@your-domain.com
app.email.from=${MAIL_FROM:noreply@interhubdev.com}
app.email.from-name=${MAIL_FROM_NAME:InterHubDev}
app.email.enabled=${MAIL_ENABLED:true}
app.email.log-only=${MAIL_LOG_ONLY:false}
app.email.base-url=${APP_BASE_URL:http://localhost:3000}
