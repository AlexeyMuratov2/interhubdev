# Test deploy stack (VPS): backend + Postgres, MinIO, Redis (with password), ClamAV.
# TLS and static SPA are handled by Caddy on the host (not in this file).
# Backend listens on loopback only: 127.0.0.1:${BACKEND_HOST_PORT} → Caddy reverse_proxy.
#
# Usage:
#   docker compose -f docker-compose.test-deploy.yml up -d --build
#
# For local dev without the app container, use compose.yaml (dependencies only).

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: interhubdev-backend:${BACKEND_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      clamav:
        condition: service_started
    networks:
      - app_net
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-18080}:8080"

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  redis:
    image: ${REDIS_IMAGE:-redis:7.4-alpine}
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    # Password is injected by Compose as one argv token (no shell), so special characters are safe.
    # REDISCLI_AUTH in env is not reliable in all Docker versions for healthcheck subprocesses.
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 15s
    networks:
      - app_net

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - app_net

  clamav:
    image: ${CLAMAV_IMAGE:-clamav/clamav:latest}
    restart: unless-stopped
    volumes:
      - clamav_data:/var/lib/clamav
      - ./clamav/clamd.conf:/etc/clamav/clamd.conf:ro
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:

networks:
  app_net:
    driver: bridge
