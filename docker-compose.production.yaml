# Production stack: app + PostgreSQL, MinIO, Redis, ClamAV.
# Usage: copy .env (from .env.example), load image (docker load -i interhubdev.tar), then:
#   docker compose -f docker-compose.production.yaml up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: interhubdev-postgres
    environment:
      POSTGRES_DB: interhubdev
      POSTGRES_USER: interhubdev
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interhubdev -d interhubdev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interhubdev-network

  minio:
    image: minio/minio:latest
    container_name: interhubdev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - interhubdev-network

  redis:
    image: redis:7-alpine
    container_name: interhubdev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interhubdev-network

  clamav:
    image: clamav/clamav:latest
    container_name: interhubdev-clamav
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
      - ./clamav/clamd.conf:/etc/clamav/clamd.conf:ro
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - interhubdev-network

  app:
    image: interhubdev:latest
    container_name: interhubdev-app
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: interhubdev
      DB_USER: interhubdev
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
      CLAMAV_ENABLED: "true"
      CLAMAV_MAX_SCANNABLE_BYTES: "524288000"
    ports:
      - "8080:8080"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=1g
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - interhubdev-network

volumes:
  postgres_data:
  minio_data:
  redis_data:
  clamav_data:

networks:
  interhubdev-network:
    driver: bridge
